name: Android CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create minimal gradlew script
        run: |
          cat > gradlew <<'EOF'
          #!/usr/bin/env sh
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" >/dev/null 2>&1 && pwd)"
          WRAPPER_JAR="$SCRIPT_DIR/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "ERROR: gradle-wrapper.jar tidak ditemukan di $WRAPPER_JAR"
            exit 1
          fi
          exec java -jar "$WRAPPER_JAR" "$@"
          EOF
          chmod +x gradlew

      - name: Download Gradle wrapper jar (robust)
        run: |
          set -e
          mkdir -p gradle/wrapper
          echo "Downloading gradle-8.4-bin.zip..."
          curl -L -o gradle-8.4-bin.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          echo "Looking for gradle-wrapper.jar inside the zip..."
          FILE=$(unzip -Z1 gradle-8.4-bin.zip 2>/dev/null | grep 'gradle-wrapper.jar' | head -n1 || true)
          if [ -z "$FILE" ]; then
            FILE=$(unzip -l gradle-8.4-bin.zip | awk '{print $4}' | grep 'gradle-wrapper.jar' | head -n1 || true)
          fi
          if [ -z "$FILE" ]; then
            echo "ERROR: gradle-wrapper.jar not found in zip. Listing zip contents for debugging:"
            unzip -l gradle-8.4-bin.zip | sed -n '1,200p'
            rm gradle-8.4-bin.zip
            exit 1
          fi
          echo "Found in zip: $FILE"
          unzip -j gradle-8.4-bin.zip "$FILE" -d gradle/wrapper
          rm gradle-8.4-bin.zip
          ls -la gradle/wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
